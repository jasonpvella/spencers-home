<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Meet children waiting for forever families." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://storage.googleapis.com" />
    <title>Spencer's Home — Meet Our Kids</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:24px;font-family:sans-serif;max-width:600px">' +
          '<h2 style="color:#b91c1c;margin:0 0 8px">Load error</h2>' +
          '<pre style="font-size:12px;white-space:pre-wrap;color:#374151">' +
          msg + '\n' + src + ':' + line +
          '</pre></div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<div style="padding:24px;font-family:sans-serif;max-width:600px">' +
          '<h2 style="color:#b91c1c;margin:0 0 8px">Unhandled error</h2>' +
          '<pre style="font-size:12px;white-space:pre-wrap;color:#374151">' +
          (e.reason && e.reason.message ? e.reason.message : String(e.reason)) +
          '</pre></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
